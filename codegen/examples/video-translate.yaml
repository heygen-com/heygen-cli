"GET /v3/video-translations":
  - desc: "List translations"
    cmd: "heygen video-translate list --limit 10"
"GET /v3/video-translations/{video_translation_id}":
  - desc: "Check translation status"
    cmd: "heygen video-translate get <video-translation-id>"
"POST /v3/video-translations":
  - desc: "Translate a video to Spanish and wait (use --request-schema for all fields)"
    cmd: "heygen video-translate create --output-languages es --mode precision --wait"
  - desc: "Translate with full config from JSON file"
    cmd: "heygen video-translate create -d request.json --wait"
"PATCH /v3/video-translations/{video_translation_id}":
  - desc: "Update translation title"
    cmd: "heygen video-translate update <video-translation-id> --title 'New title'"
"DELETE /v3/video-translations/{video_translation_id}":
  - desc: "Delete a translation"
    cmd: "heygen video-translate delete <video-translation-id>"
"GET /v3/video-translations/{video_translation_id}/caption":
  - desc: "Download caption as SRT"
    cmd: "heygen video-translate caption get <video-translation-id> --format srt"
"GET /v3/video-translations/languages":
  - desc: "List supported languages"
    cmd: "heygen video-translate languages list"
"POST /v3/video-translations/proofreads":
  - desc: "Create a proofread from JSON"
    cmd: "heygen video-translate proofreads create -d request.json"
"GET /v3/video-translations/proofreads/{proofread_id}":
  - desc: "Check proofread status"
    cmd: "heygen video-translate proofreads get <proofread-id>"
"POST /v3/video-translations/proofreads/{proofread_id}/generate":
  - desc: "Generate proofread output"
    cmd: "heygen video-translate proofreads generate <proofread-id>"
"GET /v3/video-translations/proofreads/{proofread_id}/srt":
  - desc: "Download proofread SRT"
    cmd: "heygen video-translate proofreads srt get <proofread-id>"
"PUT /v3/video-translations/proofreads/{proofread_id}/srt":
  - desc: "Upload corrected SRT"
    cmd: "heygen video-translate proofreads srt update <proofread-id>"
