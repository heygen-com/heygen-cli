"GET /v3/audio/sounds":
  - desc: "Search background music by description"
    cmd: "heygen audio sounds list --query 'upbeat lofi hip-hop'"
  - desc: "Tighten the similarity threshold and cap results"
    cmd: "heygen audio sounds list --query 'tense cinematic riser' --min-score 0.8 --limit 5"
  - desc: "Page through all matches"
    cmd: "heygen audio sounds list --query 'calm ambient piano' --all"
