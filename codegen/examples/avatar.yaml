"GET /v3/avatars":
  - desc: "List avatars"
    cmd: "heygen avatar list --limit 10"
"GET /v3/avatars/{group_id}":
  - desc: "Get avatar details"
    cmd: "heygen avatar get <group-id>"
"POST /v3/avatars":
  - desc: "See required fields for avatar creation"
    cmd: "heygen avatar create --request-schema"
"DELETE /v3/avatars/{group_id}":
  - desc: "Delete an avatar group and all its looks"
    cmd: "heygen avatar delete <group-id>"
"POST /v3/avatars/{group_id}/consent":
  - desc: "Submit avatar consent"
    cmd: "heygen avatar consent create <group-id>"
"GET /v3/avatars/looks":
  - desc: "Browse avatar looks"
    cmd: "heygen avatar looks list --limit 10"
"GET /v3/avatars/looks/{look_id}":
  - desc: "Get look details"
    cmd: "heygen avatar looks get <look-id>"
"PATCH /v3/avatars/looks/{look_id}":
  - desc: "Rename a look"
    cmd: "heygen avatar looks update <look-id> --name 'New name'"
"DELETE /v3/avatars/looks/{look_id}":
  - desc: "Delete an avatar look"
    cmd: "heygen avatar looks delete <look-id>"
