"POST /v3/videos/batches":
  - desc: "Submit a batch of avatar videos in one request (up to 100 items)"
    cmd: "heygen batch batches create --title 'Launch batch' -d '{\"videos\":[{\"type\":\"avatar\",\"avatar_id\":\"<avatar-id>\",\"script\":\"Hello world\",\"voice_id\":\"<voice-id>\"}]}'"
  - desc: "See the full batch request shape (per-item video payloads)"
    cmd: "heygen batch batches create --request-schema"
"GET /v3/videos/batches/{batch_id}":
  - desc: "Check a batch's per-item video ids and statuses"
    cmd: "heygen batch batches get <batch-id>"
"GET /v3/videos/statuses":
  - desc: "Look up statuses for specific video ids"
    cmd: "heygen batch statuses list --video-ids <video-id-1>,<video-id-2>"
  - desc: "Expand batches into their member video statuses"
    cmd: "heygen batch statuses list --batch-ids <batch-id-1>,<batch-id-2>"
