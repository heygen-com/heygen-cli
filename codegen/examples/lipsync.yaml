"GET /v3/lipsyncs":
  - desc: "List lipsync jobs"
    cmd: "heygen lipsync list --limit 10"
"POST /v3/lipsyncs":
  - desc: "Create a lipsync job from JSON (use --request-schema for required fields)"
    cmd: "heygen lipsync create -d request.json"
"GET /v3/lipsyncs/{lipsync_id}":
  - desc: "Check lipsync status"
    cmd: "heygen lipsync get <lipsync-id>"
"PATCH /v3/lipsyncs/{lipsync_id}":
  - desc: "Update lipsync title"
    cmd: "heygen lipsync update <lipsync-id> --title 'Updated title'"
"DELETE /v3/lipsyncs/{lipsync_id}":
  - desc: "Delete a lipsync job"
    cmd: "heygen lipsync delete <lipsync-id>"
