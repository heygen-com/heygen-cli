"GET /v3/voices":
  - desc: "List public voices"
    cmd: "heygen voice list --type public"
  - desc: "List starfish-engine voices (required for TTS)"
    cmd: "heygen voice list --engine starfish"
  - desc: "Filter by language and gender"
    cmd: "heygen voice list --language English --gender female --limit 5"
"POST /v3/voices":
  - desc: "Design a voice by description"
    cmd: "heygen voice create --prompt 'warm, confident female narrator'"
  - desc: "Design with gender hint and seed variation"
    cmd: "heygen voice create --prompt 'deep male voice' --gender male --seed 1"
"GET /v3/voices/{voice_id}":
  - desc: "Get voice details"
    cmd: "heygen voice get <voice-id>"
  - desc: "Poll a voice clone until complete"
    cmd: "heygen voice get <voice-clone-id>"
"POST /v3/voices/clone":
  - desc: "Clone a voice from a URL"
    cmd: "heygen voice clone create --voice-name 'My Clone' -d '{\"audio\":{\"type\":\"url\",\"url\":\"https://example.com/sample.mp3\"}}'"
  - desc: "Clone from an uploaded asset"
    cmd: "heygen voice clone create --voice-name 'My Clone' -d '{\"audio\":{\"type\":\"asset_id\",\"asset_id\":\"<asset-id>\"}}'"
"POST /v3/voices/speech":
  - desc: "Generate speech (requires starfish-engine voice)"
    cmd: "heygen voice speech create --text 'Hello world' --voice-id <voice-id>"
